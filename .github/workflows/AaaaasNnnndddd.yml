name: Release Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager "ndk;26.1.10909125" "build-tools;34.0.0"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: pnpm tauri android init

      - name: Build Release APK with debug keystore
        run: |
          # ساخت کلید دیباگ در مسیر استاندارد (فقط یک بار)
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -alias androiddebugkey \
              -dname "CN=Android Debug, O=Android, C=US"
          fi
          # ساخت APK نسخه Release با کلید دیباگ
          pnpm tauri android build --release --apk
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
